name: AI Safety Evals (Promptfoo)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Promptfoo AI Evals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx promptfoo eval

      - name: Generate Summary
        if: always()
        run: |
          npx promptfoo export results.md
          cat results.md >> $GITHUB_STEP_SUMMARY
