name: AI Safety Evals (Promptfoo)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  evaluate-ai:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Promptfoo AI Evals
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npx promptfoo@latest eval --config promptfooconfig.yaml -o ./out/index.html || true

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

      - uses: actions/deploy-pages@v4
        id: deployment
